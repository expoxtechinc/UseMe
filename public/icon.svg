<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Deep premium background -->
  <rect width="512" height="512" rx="100" fill="#080b11"/>
  <!-- Glowing subtle backing -->
  <rect x="76" y="116" width="360" height="280" rx="24" fill="none" stroke="#4f46e5" stroke-width="6" opacity="0.15"/>
  <!-- Main virtual card -->
  <rect x="80" y="120" width="352" height="272" rx="20" fill="url(#cardGrad)" stroke="#4f46e5" stroke-width="2"/>
  <!-- Metallic chip -->
  <rect x="120" y="170" width="56" height="42" rx="6" fill="url(#chipGrad)" stroke="#000" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Inner chip details -->
  <rect x="126" y="175" width="44" height="32" rx="4" fill="none" stroke="#000" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="148" y1="170" x2="148" y2="212" stroke="#000" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="120" y1="191" x2="176" y2="191" stroke="#000" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Brand text -->
  <text x="300" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" letter-spacing="2">UseMe</text>
  <text x="300" y="210" font-family="monospace" font-size="9" font-weight="bold" fill="#6366f1" letter-spacing="3">VISA</text>
  <!-- Card signal / Wifi waves -->
  <path d="M196 181 A 8 8 0 0 1 196 201 M203 174 A 14 14 0 0 1 203 208" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <!-- Card Number Mask -->
  <text x="120" y="295" font-family="monospace" font-size="24" font-weight="bold" fill="#f3f4f6" letter-spacing="4">••••  ••••  ••••  4111</text>
  <!-- Holder & Expiry -->
  <text x="120" y="345" font-family="sans-serif" font-size="10" font-weight="bold" fill="#9ca3af" letter-spacing="1">CARD HOLDER</text>
  <text x="120" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">SANDBOX USER</text>
  
  <text x="340" y="345" font-family="sans-serif" font-size="10" font-weight="bold" fill="#9ca3af" letter-spacing="1">EXPIRES</text>
  <text x="340" y="360" font-family="monospace" font-size="12" font-weight="bold" fill="#ffffff">12/29</text>
  
  <defs>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#311042"/>
    </linearGradient>
    <!-- Chip metallic gradient -->
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
</svg>
